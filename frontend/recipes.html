<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Pantry — Ricette</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .hidden { display: none !important; }
        .border-success { border-top: 3px solid var(--success); }
        #recipes-stats { display: none; gap: 1rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
    </style>
</head>
<body>

<nav class="drawer" id="drawer">
    <div class="drawer-header">
        <div class="drawer-brand">
            <div class="brand-mark"></div>
            <span>Smart Pantry</span>
        </div>
        <button class="drawer-close" id="drawer-close">&times;</button>
    </div>
    <div class="drawer-nav">
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="pantry.html" class="nav-link">Dispensa</a>
        <a href="scanner.html" class="nav-link">Aggiungi prodotto</a>
        <a href="recipes.html" class="nav-link active">Ricette</a>
    </div>
    <div class="drawer-footer">
        <div class="user-chip">
            <div class="user-avatar" id="sidebar-avatar">U</div>
            <span class="user-name" id="sidebar-username">Utente</span>
        </div>
        <button class="btn btn-ghost btn-sm" id="btn-logout">Esci</button>
    </div>
</nav>
<div class="drawer-overlay" id="drawer-overlay"></div>

<div class="app">
    <header class="topbar">
        <button class="hamburger" id="hamburger" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
        <h1 class="page-title">Ricette</h1>
        <div class="topbar-end">
            <button id="btn-reload" class="btn btn-outline btn-sm">Aggiorna</button>
        </div>
    </header>

    <main class="page-content">

        <!-- Tab: Consigliate / Cerca -->
        <div class="recipes-tabs">
            <button class="recipes-tab active" data-tab="suggested">
                Consigliate
            </button>
            <button class="recipes-tab" data-tab="search">
                Cerca ricetta
            </button>
        </div>

        <!-- ===== SEZIONE: RICETTE CONSIGLIATE ===== -->
        <div id="section-suggested">

            <!-- Toggle solo dispensa -->
            <div style="display:flex; align-items:center; gap:1.5rem; margin-bottom:1.25rem; flex-wrap:wrap;">
                <label class="toggle-label">
                    <label class="toggle-switch">
                        <input type="checkbox" id="toggle-pantry-only">
                        <span class="toggle-slider"></span>
                    </label>
                    <span>Solo ingredienti in dispensa</span>
                </label>
                <p style="font-size:0.85rem; color:var(--text-light); margin:0;">
                    Ricette ordinate per compatibilità con la tua dispensa.
                </p>
            </div>

            <!-- Statistiche risultati -->
            <div id="recipes-stats" class="stats-grid"></div>

            <!-- Loader skeleton -->
            <div id="recipes-loader" style="display:none;">
                <div class="recipes-grid">
                    ${[1,2,3,4,5,6].map(() => `
                        <div class="recipe-skeleton">
                            <div class="skeleton-img"></div>
                            <div class="skeleton-body">
                                <div class="skeleton-line"></div>
                                <div class="skeleton-line short"></div>
                                <div class="skeleton-line"></div>
                            </div>
                        </div>`).join('')}
                </div>
            </div>

            <!-- Griglia ricette -->
            <div class="recipes-grid" id="recipes-grid">
                <div class="loading" style="grid-column:1/-1; padding:3rem;">
                    <div class="spinner"></div>
                    <span>Caricamento ricette…</span>
                </div>
            </div>
        </div>

        <!-- ===== SEZIONE: CERCA RICETTA ===== -->
        <div id="section-search" class="hidden">

            <!-- Barra di ricerca -->
            <div style="display:flex; gap:0.6rem; margin-bottom:1.25rem;">
                <input class="form-control" type="text" id="search-query"
                       placeholder="Cerca una ricetta… es. pizza, pasta al pesto, tiramisù"
                       autocomplete="off" style="flex:1;">
                <button id="btn-search" class="btn btn-primary">Cerca</button>
            </div>

            <!-- Suggerimenti rapidi -->
            <div id="search-suggestions" style="margin-bottom:1.25rem;">
                <p style="font-size:0.82rem; color:var(--text-light); margin-bottom:0.5rem;">Cerca ad esempio:</p>
                <div style="display:flex; flex-wrap:wrap; gap:0.4rem;">
                    <button class="filter-btn" onclick="quickSearch('pizza')">pizza</button>
                    <button class="filter-btn" onclick="quickSearch('pasta')">pasta</button>
                    <button class="filter-btn" onclick="quickSearch('risotto')">risotto</button>
                    <button class="filter-btn" onclick="quickSearch('pollo')">pollo</button>
                    <button class="filter-btn" onclick="quickSearch('insalata')">insalata</button>
                    <button class="filter-btn" onclick="quickSearch('dolce')">dolce</button>
                    <button class="filter-btn" onclick="quickSearch('zuppa')">zuppa</button>
                    <button class="filter-btn" onclick="quickSearch('frittata')">frittata</button>
                </div>
            </div>

            <!-- Info risultati -->
            <div id="search-info" class="search-info" style="display:none;">
                Risultati per: <strong id="search-query-label"></strong>
                <span id="search-count"></span>
            </div>

            <!-- Loader ricerca -->
            <div id="search-loader" class="loading" style="display:none; padding:2rem;">
                <div class="spinner"></div>
                <span>Ricerca in corso…</span>
            </div>

            <!-- Griglia risultati ricerca -->
            <div class="recipes-grid" id="search-grid"></div>
        </div>

    </main>
</div>

<script src="js/api.js"></script>
<script src="js/recipes.js"></script>
</body>
</html>
